name: new_travel
description: Travel World Online — B2B travel platform for Indian travel agents.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^17.2.3

  # Data models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Networking
  dio: ^5.8.0+1

  # Firebase
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  firebase_messaging: ^16.2.1
  firebase_analytics: ^12.4.0
  firebase_app_check: ^0.4.4
  firebase_crashlytics: ^5.2.1

  # Storage
  flutter_secure_storage: ^10.2.0
  shared_preferences: ^2.3.5

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  lottie: ^3.2.0
  flutter_svg: ^2.0.17
  flutter_animate: ^4.5.0

  # Notifications
  flutter_local_notifications: ^21.0.0

  # App updates
  upgrader: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.2

flutter:
  uses-material-design: true
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlayfairDisplay-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-Italic.ttf
          style: italic
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
  assets:
    - assets/fonts/
    - assets/images/
    - assets/illustrations/
    - assets/animations/
