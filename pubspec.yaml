name: new_travel
description: Travel World Online — B2B travel platform for Indian travel agents.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Data models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.8.0+1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  firebase_messaging: ^15.2.5
  firebase_analytics: ^11.4.5
  firebase_app_check: ^0.3.2+4
  firebase_crashlytics: ^4.3.4

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  lottie: ^3.2.0
  flutter_svg: ^2.0.17
  flutter_animate: ^4.5.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # App updates
  upgrader: ^11.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlayfairDisplay-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-Italic.ttf
          style: italic
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
  assets:
    - assets/fonts/
    - assets/images/
    - assets/illustrations/
    - assets/animations/
