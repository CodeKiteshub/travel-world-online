  <rect x="82" y="215" width="14" height="11" fill="#C9A84C" opacity="0.15" rx="1"/>
  <rect x="42" y="235" width="14" height="11" fill="#C9A84C" opacity="0.28" rx="1"/>
  <rect x="62" y="235" width="14" height="11" fill="#C9A84C" opacity="0.15" rx="1"/>
  <rect x="82" y="235" width="14" height="11" fill="#C9A84C" opacity="0.24" rx="1"/>
  <rect x="287" y="215" width="14" height="11" fill="#C9A84C" opacity="0.25" rx="1"/>
  <rect x="307" y="215" width="14" height="11" fill="#C9A84C" opacity="0.15" rx="1"/>
  <rect x="327" y="215" width="14" height="11" fill="#C9A84C" opacity="0.35" rx="1"/>
  <rect x="287" y="235" width="14" height="11" fill="#C9A84C" opacity="0.18" rx="1"/>
