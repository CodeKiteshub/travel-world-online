  <line x1="20" y1="360" x2="80" y2="360" stroke="#C9A84C" stroke-width="0.5" opacity="0.25"/>
  <line x1="100" y1="372" x2="190" y2="372" stroke="#FFFFFF" stroke-width="0.4" opacity="0.15"/>
  <line x1="210" y1="358" x2="320" y2="358" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
