<svg viewBox="0 0 390 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060F1A"/>
      <stop offset="100%" stop-color="#0A1E35"/>
    </linearGradient>
    <linearGradient id="water-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F2840"/>
      <stop offset="100%" stop-color="#071520"/>
    </linearGradient>
    <linearGradient id="hotel-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3550"/>
      <stop offset="100%" stop-color="#0D2238"/>
    </linearGradient>
    <linearGradient id="fade-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="50%" stop-color="#0D1B2A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="moon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8D08A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky background -->
  <rect width="390" height="520" fill="url(#sky-grad)"/>

