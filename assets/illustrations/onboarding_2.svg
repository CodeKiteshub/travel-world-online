  <rect x="130" y="207" width="18" height="14" fill="#C9A84C" opacity="0.38" rx="1"/>
  <rect x="156" y="207" width="18" height="14" fill="#C9A84C" opacity="0.14" rx="1"/>
  <rect x="182" y="207" width="18" height="14" fill="#C9A84C" opacity="0.3" rx="1"/>
  <rect x="208" y="207" width="18" height="14" fill="#C9A84C" opacity="0.42" rx="1"/>
  <rect x="234" y="207" width="18" height="14" fill="#C9A84C" opacity="0.2" rx="1"/>
