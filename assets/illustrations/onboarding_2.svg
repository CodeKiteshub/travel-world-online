  <rect x="182" y="138" width="18" height="14" fill="#C9A84C" opacity="0.15" rx="1"/>
  <rect x="208" y="138" width="18" height="14" fill="#C9A84C" opacity="0.38" rx="1"/>
  <rect x="234" y="138" width="18" height="14" fill="#C9A84C" opacity="0.22" rx="1"/>
  <!-- Row 3 -->
  <rect x="130" y="161" width="18" height="14" fill="#C9A84C" opacity="0.32" rx="1"/>
  <rect x="156" y="161" width="18" height="14" fill="#C9A84C" opacity="0.18" rx="1"/>
  <rect x="182" y="161" width="18" height="14" fill="#C9A84C" opacity="0.42" rx="1"/>
  <rect x="208" y="161" width="18" height="14" fill="#C9A84C" opacity="0.12" rx="1"/>
  <rect x="234" y="161" width="18" height="14" fill="#C9A84C" opacity="0.36" rx="1"/>
  <!-- Row 4 -->
  <rect x="130" y="184" width="18" height="14" fill="#C9A84C" opacity="0.18" rx="1"/>
  <rect x="156" y="184" width="18" height="14" fill="#C9A84C" opacity="0.38" rx="1"/>
  <rect x="182" y="184" width="18" height="14" fill="#C9A84C" opacity="0.25" rx="1"/>
  <rect x="208" y="184" width="18" height="14" fill="#C9A84C" opacity="0.35" rx="1"/>
  <rect x="234" y="184" width="18" height="14" fill="#C9A84C" opacity="0.16" rx="1"/>
