  <circle cx="28" cy="32" r="1.0" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="65" cy="18" r="1.3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="98" cy="42" r="0.8" fill="#C9A84C" opacity="0.7"/>
  <circle cx="140" cy="24" r="1.1" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="175" cy="50" r="0.8" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="215" cy="30" r="1.2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="250" cy="14" r="0.9" fill="#C9A84C" opacity="0.6"/>
  <circle cx="355" cy="140" r="1.0" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="22" cy="80" r="0.8" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="370" cy="58" r="0.9" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="48" cy="120" r="0.7" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="168" cy="88" r="0.9" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="82" cy="160" r="0.7" fill="#C9A84C" opacity="0.4"/>
  <circle cx="362" cy="188" r="0.8" fill="#FFFFFF" opacity="0.3"/>

