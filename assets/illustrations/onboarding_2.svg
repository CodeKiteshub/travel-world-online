  <ellipse cx="62" cy="258" rx="28" ry="12" fill="#1E4A30" opacity="0.8" transform="rotate(-15,62,258)"/>
  <ellipse cx="62" cy="258" rx="26" ry="10" fill="#1E4A30" opacity="0.7" transform="rotate(10,62,258)"/>
  <ellipse cx="62" cy="258" rx="24" ry="9" fill="#1E4A30" opacity="0.6" transform="rotate(35,62,258)"/>
  <ellipse cx="62" cy="258" rx="24" ry="9" fill="#1E4A30" opacity="0.6" transform="rotate(-40,62,258)"/>

  <!-- Palm trees right -->
  <line x1="328" y1="343" x2="328" y2="255" stroke="#1A3A28" stroke-width="5"/>
  <ellipse cx="328" cy="258" rx="28" ry="12" fill="#1E4A30" opacity="0.8" transform="rotate(15,328,258)"/>
  <ellipse cx="328" cy="258" rx="26" ry="10" fill="#1E4A30" opacity="0.7" transform="rotate(-10,328,258)"/>
  <ellipse cx="328" cy="258" rx="24" ry="9" fill="#1E4A30" opacity="0.6" transform="rotate(-35,328,258)"/>
  <ellipse cx="328" cy="258" rx="24" ry="9" fill="#1E4A30" opacity="0.6" transform="rotate(40,328,258)"/>

