  <path d="M195 55 L218 65 L195 75 Z" fill="#C9A84C" opacity="0.7"/>

  <!-- Reflection in pool -->
  <rect x="115" y="343" width="160" height="80" fill="url(#hotel-grad)" opacity="0.2"/>
  <rect x="130" y="355" width="18" height="10" fill="#C9A84C" opacity="0.1" rx="1"/>
  <rect x="182" y="355" width="18" height="10" fill="#C9A84C" opacity="0.12" rx="1"/>
  <rect x="234" y="355" width="18" height="10" fill="#C9A84C" opacity="0.1" rx="1"/>

  <!-- Bottom fade -->
