<svg viewBox="0 0 390 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="globe-glow" cx="50%" cy="48%" r="42%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="globe-inner" cx="50%" cy="48%" r="38%">
      <stop offset="0%" stop-color="#152B40" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="fade-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="55%" stop-color="#0D1B2A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="1"/>
    </linearGradient>
    <clipPath id="globe-clip">
      <circle cx="195" cy="248" r="148"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="390" height="520" fill="#0D1B2A"/>

  <!-- Ambient glow behind globe -->
  <rect width="390" height="520" fill="url(#globe-glow)"/>

  <!-- Stars scattered -->
  <circle cx="42" cy="38" r="1.2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="78" cy="62" r="0.8" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="110" cy="28" r="1.5" fill="#C9A84C" opacity="0.8"/>
  <circle cx="145" cy="52" r="0.9" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="180" cy="18" r="1.1" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="215" cy="44" r="0.7" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="258" cy="22" r="1.3" fill="#C9A84C" opacity="0.7"/>
  <circle cx="300" cy="50" r="0.8" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="340" cy="30" r="1.4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="368" cy="68" r="0.9" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="30" cy="100" r="0.7" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="360" cy="110" r="1.1" fill="#C9A84C" opacity="0.5"/>
  <circle cx="55" cy="148" r="0.8" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="330" cy="160" r="0.9" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="20" cy="200" r="1.0" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="370" cy="190" r="0.8" fill="#FFFFFF" opacity="0.35"/>

  <!-- Globe outer rings (decorative) -->
  <circle cx="195" cy="248" r="170" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.15"/>
  <circle cx="195" cy="248" r="158" fill="none" stroke="#C9A84C" stroke-width="0.3" opacity="0.1"/>

  <!-- Globe filled -->
  <circle cx="195" cy="248" r="148" fill="url(#globe-inner)"/>
  <circle cx="195" cy="248" r="148" fill="none" stroke="#C9A84C" stroke-width="1.2" opacity="0.6"/>

  <!-- Latitude lines (clipped to globe) -->
  <g clip-path="url(#globe-clip)" opacity="0.25">
    <ellipse cx="195" cy="248" rx="148" ry="36" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
    <ellipse cx="195" cy="248" rx="148" ry="76" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
    <ellipse cx="195" cy="248" rx="148" ry="112" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
    <line x1="47" y1="248" x2="343" y2="248" stroke="#C9A84C" stroke-width="0.8"/>
  </g>

  <!-- Longitude lines (clipped to globe) -->
  <g clip-path="url(#globe-clip)" opacity="0.25">
    <ellipse cx="195" cy="248" rx="36" ry="148" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
    <ellipse cx="195" cy="248" rx="76" ry="148" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
    <ellipse cx="195" cy="248" rx="112" ry="148" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
    <line x1="195" y1="100" x2="195" y2="396" stroke="#C9A84C" stroke-width="0.8"/>
  </g>

  <!-- Continent outlines (simplified, clipped to globe) -->
  <g clip-path="url(#globe-clip)" fill="#1E3A5F" opacity="0.6">
    <!-- Europe/Asia mass -->
    <path d="M175 165 Q200 155 230 162 Q260 168 280 180 Q290 195 285 210 Q278 225 265 228 Q250 232 240 225 Q228 218 220 222 Q210 228 200 220 Q188 212 178 215 Q165 218 158 205 Q150 190 158 178 Q165 168 175 165Z"/>
    <!-- Africa -->
    <path d="M185 230 Q200 225 215 230 Q228 238 230 258 Q232 278 225 295 Q218 310 205 315 Q192 318 182 308 Q170 295 170 275 Q168 255 178 240 Q182 233 185 230Z"/>
    <!-- Americas -->
    <path d="M105 175 Q118 168 128 175 Q138 182 138 198 Q140 215 132 228 Q125 240 115 238 Q105 235 100 220 Q95 205 98 190 Q100 180 105 175Z"/>
    <path d="M112 248 Q122 242 130 248 Q138 255 136 270 Q134 285 128 295 Q120 302 112 298 Q104 292 104 278 Q102 263 108 253 Q110 250 112 248Z"/>
    <!-- Australia -->
    <path d="M268 272 Q282 268 292 275 Q300 283 298 296 Q295 308 284 312 Q273 315 265 307 Q258 298 260 286 Q262 276 268 272Z"/>
  </g>

  <!-- Flight route arcs (on top of globe) -->
  <!-- Route 1: Europe to Americas -->
  <path d="M158 190 Q195 140 128 198" fill="none" stroke="#C9A84C" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- Route 2: Europe to Australia -->
  <path d="M230 185 Q300 220 284 290" fill="none" stroke="#C9A84C" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- Route 3: Americas to Asia -->
  <path d="M118 218 Q160 160 265 215" fill="none" stroke="#FFFFFF" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.4"/>
  <!-- Route 4: Short hop -->
  <path d="M200 215 Q240 195 268 275" fill="none" stroke="#C9A84C" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.5"/>

  <!-- City nodes (gold dots) -->
  <circle cx="205" cy="175" r="3.5" fill="#C9A84C" opacity="0.9"/>
  <circle cx="205" cy="175" r="6" fill="#C9A84C" opacity="0.2"/>
  <circle cx="120" cy="200" r="3" fill="#C9A84C" opacity="0.8"/>
  <circle cx="120" cy="200" r="5.5" fill="#C9A84C" opacity="0.15"/>
  <circle cx="278" cy="282" r="3" fill="#C9A84C" opacity="0.8"/>
  <circle cx="278" cy="282" r="5.5" fill="#C9A84C" opacity="0.15"/>
  <circle cx="260" cy="218" r="2.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="185" cy="275" r="2.5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="145" cy="248" r="2" fill="#FFFFFF" opacity="0.5"/>

  <!-- Airplane silhouette (along route 1) -->
  <g transform="translate(165 162) rotate(-35)">
    <path d="M0 0 L-6 4 L0 3 L6 4 Z" fill="#FFFFFF" opacity="0.9"/>
    <path d="M-1 3 L-3 8 L0 7 L3 8 L1 3 Z" fill="#FFFFFF" opacity="0.7"/>
    <path d="M-1 4 L-1.5 6 L1.5 6 L1 4 Z" fill="#FFFFFF" opacity="0.6"/>
  </g>

  <!-- Second airplane (smaller, along route 2) -->
  <g transform="translate(262 235) rotate(55)">
    <path d="M0 0 L-4 2.5 L0 2 L4 2.5 Z" fill="#C9A84C" opacity="0.8"/>
    <path d="M-0.7 2 L-2 5 L0 4.5 L2 5 L0.7 2 Z" fill="#C9A84C" opacity="0.6"/>
  </g>

  <!-- Bottom gradient fade to match white card -->
  <rect width="390" height="520" fill="url(#fade-bottom)"/>
</svg>
